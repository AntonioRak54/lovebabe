<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🎂 Joyeux Anniversaire Fanny !</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      height: -webkit-fill-available;
    }

    body {
      min-height: 100vh;
      min-height: -webkit-fill-available;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Poppins", Arial, sans-serif;
      color: white;
      overflow-x: hidden;
      overflow-y: auto;
      padding: 20px 14px;
      padding-bottom: env(safe-area-inset-bottom, 20px);
      -webkit-overflow-scrolling: touch;
    }

    .card {
      width: 100%;
      max-width: 380px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 28px;
      padding: 30px 20px;
      text-align: center;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
      position: relative;
      z-index: 2;
      animation: fadeInUp 1s ease;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .cake {
      font-size: 68px;
      margin-bottom: 10px;
      animation: bounce 1.2s infinite alternate ease-in-out;
      display: inline-block;
    }

    @keyframes bounce {
      from { transform: scale(1) rotate(-3deg); }
      to { transform: scale(1.1) rotate(3deg); }
    }

    h1 {
      font-family: 'Dancing Script', cursive;
      font-size: 2rem;
      margin-bottom: 4px;
      background: linear-gradient(90deg, #ffd700, #ff6ec7, #ffd700);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
      line-height: 1.3;
    }

    @keyframes shimmer {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    .subtitle {
      font-size: 1.1rem;
      font-weight: 700;
      color: #ff6ec7;
      margin-bottom: 4px;
    }

    .date {
      font-size: 0.9rem;
      opacity: 0.8;
      margin-bottom: 18px;
      font-weight: 600;
    }

    .message {
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 20px;
      opacity: 0.95;
    }

    .hearts {
      font-size: 1.8rem;
      letter-spacing: 6px;
      margin-bottom: 18px;
      animation: pulse 1.5s infinite;
      display: inline-block;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    .btn {
      display: inline-block;
      padding: 14px 32px;
      font-size: 1.05rem;
      font-weight: 700;
      color: #302b63;
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(255, 215, 0, 0.4);
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active {
      transform: scale(0.96);
    }

    .footer {
      margin-top: 18px;
      font-size: 0.75rem;
      opacity: 0.6;
    }

    /* Floating particles */
    .particle {
      position: fixed;
      pointer-events: none;
      z-index: 1;
      border-radius: 50%;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      from { transform: translateY(100vh) rotate(0deg); opacity: 1; }
      to { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
    }

    /* Stars */
    .star {
      position: fixed;
      width: 3px;
      height: 3px;
      background: white;
      border-radius: 50%;
      animation: twinkle 2s infinite alternate;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes twinkle {
      from { opacity: 0.2; transform: scale(1); }
      to { opacity: 1; transform: scale(1.5); }
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="cake">🎂</div>

    <h1>Joyeux Anniversaire</h1>
    <div class="subtitle">Bouboule 💖</div>
    <div class="date">17 Aout 2026</div>

    <div class="hearts">💖✨💖</div>

    <div class="message">
      Aujourd'hui, c'est ta journée, Bouboule !<br>
      Tu mérites tout le bonheur du monde. 🌍<br>
      Je suis tellement chanceux de t'avoir dans ma vie.
    </div>

    <a href="voeux.html" class="btn" style="text-decoration:none;">Ouvre mon vœu 💌</a>

    <div class="footer">Fait avec ❤️ pour toi, du fond du cœur</div>
  </div>

  <script>
    // Stars background
    for (let i = 0; i < 50; i++) {
      const star = document.createElement("div");
      star.className = "star";
      star.style.left = Math.random() * 100 + "vw";
      star.style.top = Math.random() * 100 + "vh";
      star.style.animationDelay = Math.random() * 3 + "s";
      star.style.animationDuration = (1.5 + Math.random() * 2) + "s";
      document.body.appendChild(star);
    }

    // Floating hearts
    const emojis = ["💖", "💕", "✨", "🎈", "🌟", "🎉", "💝"];
    function createParticle() {
      const p = document.createElement("div");
      p.className = "particle";
      p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      p.style.left = Math.random() * 100 + "vw";
      p.style.fontSize = (14 + Math.random() * 16) + "px";
      p.style.animationDuration = (4 + Math.random() * 5) + "s";
      p.style.animationDelay = Math.random() * 2 + "s";
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 10000);
    }

    setInterval(createParticle, 600);
  </script>

</body>
</html>
