<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>💘 Ma Valentine ?</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ff4d6d, #ffb3c1);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      color: white;
      overflow: hidden;
    }

    .card {
      width: 100%;
      max-width: 380px;
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 26px 20px;
      text-align: center;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
      position: relative;
    }

    .heart {
      font-size: 46px;
      margin-bottom: 12px;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    h1 {
      font-size: 1.45rem;
      margin-bottom: 10px;
      line-height: 1.3;
    }

    p {
      font-size: 1rem;
      margin-bottom: 18px;
      opacity: 0.95;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 12px;
    }

    button {
      width: 100%;
      padding: 16px;
      font-size: 1.05rem;
      font-weight: 600;
      border-radius: 18px;
      border: none;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    #yesBtn {
      background: #00d26a;
      color: white;
      box-shadow: 0 8px 20px rgba(0, 210, 106, 0.45);
    }

    #yesBtn:active {
      transform: scale(0.96);
    }

    #noBtn {
      background: rgba(255, 255, 255, 0.3);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.4);
    }

    .msg {
      display: none;
      margin-top: 18px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.25);
      font-size: 1.05rem;
      font-weight: 600;
    }

    .footer {
      margin-top: 16px;
      font-size: 0.8rem;
      opacity: 0.85;
    }

    .sparkle {
      position: fixed;
      width: 8px;
      height: 8px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      animation: float 2s linear infinite;
      pointer-events: none;
    }

    @keyframes float {
      from { transform: translateY(0); opacity: 1; }
      to { transform: translateY(-120px); opacity: 0; }
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="heart">💘</div>

    <h1>Hey toi… 😳</h1>
    <p>J’ai une question très importante…</p>
    <h1>Veux-tu être ma Valentine ? 💝</h1>

    <div class="buttons">
      <button id="yesBtn">Oui 🥰</button>
      <button id="noBtn">Non 😅</button>
    </div>

    <div class="msg" id="msg"></div>
    <div class="footer">Fait avec ❤️ juste pour toi</div>
  </div>

  <script>
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const msg = document.getElementById("msg");

    yesBtn.addEventListener("click", () => {
      msg.style.display = "block";
      msg.innerHTML = "YEEEES 😍💞<br>Tu viens de rendre ma journée parfaite 💘";
      confetti();
    });

    noBtn.addEventListener("touchstart", moveButton);
    noBtn.addEventListener("mouseenter", moveButton);

    function moveButton() {
      const maxX = window.innerWidth - noBtn.offsetWidth - 20;
      const maxY = window.innerHeight - noBtn.offsetHeight - 20;

      noBtn.style.position = "fixed";
      noBtn.style.left = Math.random() * maxX + "px";
      noBtn.style.top = Math.random() * maxY + "px";
    }

    function confetti() {
      for (let i = 0; i < 20; i++) {
        const s = document.createElement("div");
        s.className = "sparkle";
        s.style.left = Math.random() * window.innerWidth + "px";
        s.style.top = window.innerHeight - 40 + "px";
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 2000);
      }
    }
  </script>

</body>
</html>
