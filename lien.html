<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎁 Un cadeau pour Fanny</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      min-height: -webkit-fill-available;
      background: linear-gradient(135deg, #1a0033, #3d0066, #6b0099);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Poppins", Arial, sans-serif;
      color: white;
      overflow: hidden;
      padding: 16px;
    }

    .card {
      text-align: center;
      padding: 24px;
      animation: fadeIn 1.5s ease;
      max-width: 360px;
      width: 100%;
    }

    .gift {
      font-size: 72px;
      animation: bounce 1s infinite alternate;
      cursor: pointer;
      display: inline-block;
    }

    @keyframes bounce {
      from { transform: translateY(0) scale(1); }
      to { transform: translateY(-12px) scale(1.05); }
    }

    h1 {
      margin-top: 16px;
      font-size: 1.3rem;
      opacity: 0;
      animation: slideUp 1s 0.5s forwards;
      line-height: 1.5;
    }

    .arrow {
      margin-top: 24px;
      font-size: 2rem;
      opacity: 0;
      animation: slideUp 1s 1s forwards, pulse 1.5s 2s infinite;
      display: inline-block;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-8px) scale(1.15); }
    }

    .sparkle {
      position: fixed;
      width: 6px;
      height: 6px;
      background: rgba(255, 215, 0, 0.9);
      border-radius: 50%;
      pointer-events: none;
      animation: rise 3s linear infinite;
    }

    @keyframes rise {
      from { transform: translateY(0); opacity: 1; }
      to { transform: translateY(-100vh); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="gift">🎁</div>
    <h1>Bouboule, tu as un cadeau !<br>Ouvre-le ici 👇</h1>
    <a href="anniversaire.html" style="text-decoration:none;color:inherit;">
      <div class="arrow">💝</div>
    </a>
  </div>

  <script>
    function createSparkle() {
      const s = document.createElement("div");
      s.className = "sparkle";
      s.style.left = Math.random() * 100 + "vw";
      s.style.top = "100vh";
      s.style.background = `hsl(${Math.random()*60+30}, 100%, 70%)`;
      s.style.animationDuration = (2 + Math.random() * 3) + "s";
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 5000);
    }

    setInterval(createSparkle, 300);
  </script>

</body>
</html>
